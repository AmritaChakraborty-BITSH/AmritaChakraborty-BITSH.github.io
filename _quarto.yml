      </div>
  
  navbar:
    background: "#003153"   
    foreground: "white"     
    collapse: true
    
    left: 
      - text: "Home"
        file: index.qmd
      - text: "Research"
        file: research.qmd
      - text: "Publication"
        file: publication.qmd
      - text: "Teaching"
        file: teaching.qmd  
      - text: "Collaborators"
        file: collaborators.qmd
      - text: "Team"
        file: team.qmd
      - text: "Opportunities"
        file: opportunities.qmd
      - text: "CV"
        file: cv_1.qmd
        
    right:
      - icon: linkedin
        href: "https://linkedin.com/in/amrita-chakraborty-b69b5aa4/"
        aria-label: LinkedIn
      - icon: envelope
        href: "mailto:amritarimic@gmail.com"
        aria-label: Email
      - icon: magnifying-glass
        aria-label: Search
        
format:
  html:
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    
    toc: true
    toc-location: right
    page-layout: article
    link-external-newwindow: true
    theme-toggle: true
    ##mainfont: "Lora"
    ##heading-font: "Playfair Display"

execute:
  freeze: auto

editor: visual



