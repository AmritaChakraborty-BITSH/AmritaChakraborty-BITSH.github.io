    center: |
      <span style="font-weight: bold;">© 2025. All rights reserved.</span>
    # RIGHT: Visitor Counter + Credit (Stacked and Right Aligned)
    right: |
      <div style="width: 320px; max-width: 100%; display: flex; justify-content: flex-end;">
