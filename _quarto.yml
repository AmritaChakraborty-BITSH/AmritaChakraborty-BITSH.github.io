  repo-url: "https://github.com/AmritaChakraborty/AmritaChakraborty.github.io"
  
  page-footer:
    background: "#003153"
    foreground: "white"
    # LEFT: Contact Info (Wrapped in div for tight spacing)
    left: |
      <div style="text-align: left; font-size: 1em; line-height: 1.4;">
        <h4>Contact</h4>
        <b>Room No - C234</b><br>
        <b>Birla Institute of Technology & Science, Pilani</b><br>
        <b>Hyderabad Campus</b><br>
        <b>Jawahar Nagar, Kapra Mandal, Dist.-Medchal, Pin-500078, Telangana, India</b><br>
        <b>Email: [amrita.chakraborty@hyderabad.bits-pilani.ac.in](mailto:amrita.chakraborty@hyderabad.bits-pilani.ac.in)</b>
